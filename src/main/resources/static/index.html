<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Online Chat - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: Arial, sans-serif; display:flex; flex-direction:column; height:100vh; }
        .header { background:#007bff; color:white; padding:12px; text-align:center; font-size:1.2em; }
        .main { display:flex; flex:1; overflow:hidden; }
        .sidebar { width:260px; background:#f8f9fa; padding:15px; overflow-y:auto; border-right:1px solid #ddd; }
        .chat-area { flex:1; display:flex; flex-direction:column; }
        .messages { flex:1; padding:15px; overflow-y:auto; background:#fff; }
        .message { margin-bottom:12px; padding:10px; border-radius:8px; background:#f1f1f1; position:relative; }
        .message .delete-btn { position:absolute; right:8px; top:8px; color:red; cursor:pointer; display:none; }
        .message:hover .delete-btn { display:block; }
        .input-area { padding:12px; background:#f8f9fa; display:flex; gap:8px; align-items:center; }
    </style>
</head>
<body>

<div class="header">Online Chat - FINAL VERSION</div>

<div class="main">
    <div class="sidebar">
        <h4>Publiczne pokoje</h4>
        <button onclick="loadPublicRooms()">Odśwież</button>
        <div id="room-list"></div>
        
        <hr>
        <input id="new-room-name" placeholder="Nazwa pokoju">
        <button onclick="createRoom()">Utwórz</button>

        <hr>
        <h4>Znajomi</h4>
        <input id="friend-username" placeholder="Username">
        <button onclick="sendFriendRequest()">Zaproszenie</button>
        <div id="friends-list"></div>

        <hr>
        <h4>Czat 1:1</h4>
        <input id="private-username" placeholder="Username">
        <button onclick="startPrivateChat()">Rozpocznij</button>
    </div>

    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input id="message-input" placeholder="Napisz wiadomość..." style="flex:1">
            <input type="file" id="file-input" style="display:none" onchange="uploadAndSend()">
            <button onclick="document.getElementById('file-input').click()">📎</button>
            <button onclick="sendMessage()">Wyślij</button>
        </div>
    </div>
</div>

<!-- Auth panel -->
<div id="auth-panel" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1000;">
    <h2>Online Chat</h2>
    <input id="username" placeholder="Username" value="testuser" style="margin:8px;padding:12px;width:300px;"><br>
    <input id="password" type="password" placeholder="Hasło" value="test123" style="margin:8px;padding:12px;width:300px;"><br>
    <button onclick="login()" style="margin:8px;padding:12px 30px;width:300px;">Zaloguj</button>
    <button onclick="register()" style="margin:8px;padding:12px 30px;width:300px;background:#28a745;">Zarejestruj</button>
</div>

<script>
    // (cały poprzedni kod JavaScript pozostaje bez zmian – tylko dodajemy przycisk delete message)
    function onMessageReceived(payload) {
        const msg = JSON.parse(payload.body);
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<strong>${msg.sender}:</strong> ${msg.content || ''}`;
        if (msg.attachmentUrl) div.innerHTML += `<br><a href="${msg.attachmentUrl}" target="_blank">📎 Plik</a>`;
        
        // przycisk usuwania wiadomości (widoczny dla admina/owner)
        const delBtn = document.createElement('span');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '🗑';
        delBtn.onclick = () => deleteMessage(msg.id || 0);
        div.appendChild(delBtn);
        
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 999999;
    }

    function deleteMessage(messageId) {
        if (stompClient) {
            stompClient.send("/app/chat.deleteMessage/" + currentRoom, {}, JSON.stringify({}));
        }
    }

    // reszta funkcji (login, register, sendMessage, uploadAndSend, loadPublicRooms itd.) pozostaje dokładnie taka sama jak w poprzedniej wersji
</script>
</body>
</html>
