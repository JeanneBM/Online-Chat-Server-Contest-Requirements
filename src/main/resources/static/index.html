<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Workshop Chat - Java</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial; margin:0; }
        .container { display:flex; height:100vh; }
        .rooms { width:200px; background:#f0f0f0; padding:10px; }
        .chat { flex:1; display:flex; flex-direction:column; }
        .messages { flex:1; overflow-y:auto; padding:10px; background:#fff; }
        .input-area { padding:10px; background:#f0f0f0; }
        .users { width:200px; background:#f0f0f0; padding:10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="rooms">Pokoje (dodamy listę później)</div>
    
    <div class="chat">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="Napisz wiadomość..." style="width:70%">
            <button onclick="sendMessage()">Wyślij</button>
        </div>
    </div>
    
    <div class="users">Użytkownicy online</div>
</div>

<script>
    let stompClient = null;
    let username = prompt("Wpisz swój username:");
    let currentRoom = "public";   // startujemy z pokojem public

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function() {
            stompClient.subscribe('/topic/' + currentRoom, onMessageReceived);
            
            const joinMsg = {sender: username, type: 'JOIN', roomId: currentRoom};
            stompClient.send("/app/chat.addUser/" + currentRoom, {}, JSON.stringify(joinMsg));
        });
    }

    function sendMessage() {
        const content = document.getElementById('message').value;
        if (content && stompClient) {
            const chatMessage = {sender: username, content: content, type: 'CHAT', roomId: currentRoom};
            stompClient.send("/app/chat.sendMessage/" + currentRoom, {}, JSON.stringify(chatMessage));
            document.getElementById('message').value = '';
        }
    }

    function onMessageReceived(payload) {
        const msg = JSON.parse(payload.body);
        const div = document.createElement('div');
        div.innerHTML = `<strong>${msg.sender}:</strong> ${msg.content}`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 9999;
    }

    connect();
</script>
</body>
</html>
