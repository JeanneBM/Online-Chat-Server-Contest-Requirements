<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Online Chat - Java</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style> /* prosty layout jak w wymaganiach */ body{margin:0;font-family:Arial;display:flex;flex-direction:column;height:100vh;}
        .header{background:#007bff;color:white;padding:10px;text-align:center;}
        .main{display:flex;flex:1;}
        .sidebar{width:220px;background:#f8f9fa;padding:10px;overflow-y:auto;}
        .chat-area{flex:1;display:flex;flex-direction:column;}
        .messages{flex:1;padding:15px;overflow-y:auto;background:#fff;}
        .input-area{padding:10px;background:#f8f9fa;}
    </style>
</head>
<body>
<div class="header">Online Chat (Docker + Spring Boot)</div>
<div class="main">
    <div class="sidebar" id="rooms">Pokoje...</div>
    <div class="chat-area">
        <div id="auth-panel">
            <h3>Logowanie</h3>
            <input id="login-username" placeholder="username" value="testuser"><br>
            <input id="login-password" type="password" placeholder="hasło" value="test123"><br>
            <button onclick="login()">Zaloguj</button>
            <button onclick="register()">Zarejestruj</button>
        </div>
        <div id="chat-panel" style="display:none;">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input id="message-input" placeholder="Napisz wiadomość..." style="width:70%">
                <button onclick="sendMessage()">Wyślij</button>
            </div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;
    let token = null;
    let currentRoom = "public";

    function register() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password, email: username + "@example.com"})
        }).then(r => r.json()).then(data => { token = data.token; startChat(); });
    }

    function login() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        }).then(r => r.json()).then(data => { token = data.token; startChat(); });
    }

    function startChat() {
        document.getElementById('auth-panel').style.display = 'none';
        document.getElementById('chat-panel').style.display = 'flex';

        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({'Authorization': 'Bearer ' + token}, function() {
            stompClient.subscribe('/topic/' + currentRoom, onMessageReceived);
            const joinMsg = {sender: "System", content: "Dołączył", type: 'JOIN'};
            stompClient.send("/app/chat.addUser/" + currentRoom, {}, JSON.stringify(joinMsg));
        });
    }

    function sendMessage() {
        const content = document.getElementById('message-input').value;
        if (content && stompClient) {
            const msg = {content, type: 'CHAT'};
            stompClient.send("/app/chat.sendMessage/" + currentRoom, {}, JSON.stringify(msg));
            document.getElementById('message-input').value = '';
        }
    }

    function onMessageReceived(payload) {
        const msg = JSON.parse(payload.body);
        const div = document.createElement('div');
        div.textContent = `${msg.sender}: ${msg.content}`;
        document.getElementById('messages').appendChild(div);
    }
</script>
</body>
</html>
